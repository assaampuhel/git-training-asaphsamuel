<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asaph Samuel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 dark:text-white antialiased font-sans">
    
    <header class="relative z-50 bg-background border-b border-slate-800 transition-all duration-300">

        <nav class="flex relative justify-between items-center py-5 px-10 max-w-[1400px] mx-auto">
            <input type="checkbox" class="hidden peer" id="mobile-menu-toggle" aria-label="Toggle mobile menu" title="Toggle mobile menu">

            <a href="#" class="text-4xl no-underline font-extrabold text-primary">AS.</a>

            <div class="absolute left-1/2 -translate-x-1/2 gap-8 hidden md:flex">
                <a href="#about" class=" text-slate-300 text-lg no-underline hover:text-primary tracking-wide transition-colors duration-300">ABOUT</a>
                <a href="#projects" class="text-slate-300 text-lg no-underline hover:text-primary tracking-wide transition-colors duration-300">PROJECTS</a>
                <a href="#contacts" class="text-slate-300 text-lg no-underline hover:text-primary tracking-wide transition-colors duration-300">CONTACTS</a>
            </div>

            <label for="mobile-menu-toggle" class="md:hidden cursor-pointer text-slate-300 hover:text-primary transition-colors">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </label>

            <div class="md:hidden bg-[#1e293b] border-b border-slate-700 shadow-xl absolute w-full left-0 top-full opacity-0 invisible -translate-y-4 peer-checked:opacity-100 peer-checked:visible peer-checked:translate-y-0 transition-all duration-300 ease-in-out">                <div class="flex flex-col items-center py-6 space-y-6">
                    <a href="#about" onclick="document.getElementById('mobile-menu-toggle').checked = false" class="text-lg font-bold tracking-widest text-slate-300 hover:text-primary no-underline transition-colors">ABOUT</a>
                    <a href="#projects" onclick="document.getElementById('mobile-menu-toggle').checked = false" class="text-lg font-bold tracking-widest text-slate-300 hover:text-primary no-underline transition-colors">PROJECTS</a>
                    <a href="#contacts" onclick="document.getElementById('mobile-menu-toggle').checked = false" class="text-lg font-bold tracking-widest text-slate-300 hover:text-primary no-underline transition-colors">CONTACTS</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="flex flex-col-reverse md:flex-row items-center justify-center md:justify-between min-h-[80vh] px-6 md:px-10 py-12 md:py-0 max-w-[1350px] mx-auto gap-12 md:gap-8">
            
            <div class="flex flex-col items-center md:items-start text-center md:text-left max-w-2xl">
                <p class="text-primary font-mono text-lg mb-4">Hi, I'm</p>
                <h1 class="text-5xl md:text-7xl font-extrabold text-slate-50 mb-6 leading-tight">Asaph Samuel</h1>
                
                <p class="text-lg text-textMuted leading-relaxed mb-10">
                    Computer Science Student @ National Institute of Technology, Surathkal, focusing on competitive programming and building modern, efficient software solutions.
                </p>

                <div class="flex flex-wrap justify-center md:justify-start gap-4 md:gap-5">
                    <a href="#projects" class="no-underline bg-primary text-background font-semibold px-8 py-3 rounded text-lg hover:bg-sky-300 hover:-translate-y-1 transition-all duration-300 ">
                        Projects
                    </a>
                    <a href="#contact" class="no-underline border border-primary text-primary px-8 py-3 rounded font-semibold hover:bg-primary/20 hover:-translate-y-1 duration-300 transition-all">
                        Contact Me
                    </a>
                </div>
            </div>

            <div class="relative w-56 h-56 md:w-[400px] md:h-[400px] flex-shrink-0">
                <div class="absolute inset-0 bg-primary rounded-full blur-3xl animate-pulse opacity-20"></div> <!--Glowing effect-->
                
                <img 
                    src="assets/photo.jpeg" 
                    alt="Asaph Samuel" 
                    class="rounded-full relative w-full h-full object-cover border-2 border-slate-700 shadow-2xl">
            </div>

        </section>
    </main>

    <footer>

    </footer>
</body>
</html>
